name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Dummy values so `next build` and `prisma generate` can evaluate modules
  # that read env at import time. Never real secrets — CI never talks to prod.
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
  NEXT_PUBLIC_SUPABASE_URL: "https://ci.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
  OPENAI_API_KEY: "sk-ci"
  ANTHROPIC_API_KEY: "sk-ant-ci"
  GOOGLE_CIVIC_API_KEY: "ci"
  CONGRESS_DOT_GOV_API_KEY: "ci"
  ADMIN_API_KEY: "ci"
  CRON_SECRET: "ci"
  STRIPE_SECRET_KEY: "sk_test_ci"
  STRIPE_PUBLISHABLE_KEY: "pk_test_ci"
  STRIPE_WEBHOOK_SECRET: "whsec_ci"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install deps
        run: npm ci

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  format:
    name: Format check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm test

  integration:
    name: Integration
    needs: install
    runs-on: ubuntu-latest
    # Pinned — the cron-route tests boot a Postgres testcontainer which takes
    # ~15s on a cold runner, and the ingestion path mocks can spin for a while.
    timeout-minutes: 15
    services:
      # Having a Postgres service side-by-side with the testcontainer is
      # belt-and-suspenders: if Docker-in-Docker on the runner has an issue,
      # the test harness falls back to TEST_DATABASE_URL pointing here.
      postgres:
        # pgvector image is Postgres 16 with the `vector` extension
        # preinstalled. The Bill embedding migration runs `CREATE
        # EXTENSION IF NOT EXISTS vector` and a vanilla `postgres:16`
        # image fails it (the .control file isn't on disk).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - name: Run integration tests
        env:
          # Reuses the service container instead of spinning a fresh
          # testcontainer — faster and avoids Docker-in-Docker setup.
          TEST_DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
        run: npm run test:integration

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - run: npm ci
      - run: npm run build

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  migration-drift:
    # Compare prisma/migrations/* against the prod _prisma_migrations
    # tracker. Catches the "PR shipped a migration that never got applied
    # to prod" failure mode (PR #55, AiSummaryFeedback, 2026-04-27 — the
    # thumbs-up/-down endpoint returned 500 for 3 days before anyone
    # noticed). The deploy pipeline runs `prisma generate && next build`
    # only — it never runs `prisma migrate deploy` — so the only forcing
    # function on the manual MCP-apply step is this check.
    #
    # PROD_DATABASE_URL is the Supavisor *direct* connection string, not
    # the pooler. Repo secret. Tracker rows are read-only here.
    name: Migration tracker drift
    needs: install
    runs-on: ubuntu-latest
    # Only fail PRs / pushes when we have credentials to actually verify.
    # Forks contributing PRs won't have access to the secret — skip there
    # rather than red-X every external contribution.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - name: Check migration tracker drift against prod
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::PROD_DATABASE_URL secret is not configured. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          npm run db:migrate:check
