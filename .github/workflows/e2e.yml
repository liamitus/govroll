# End-to-end smoke tests against a fresh Postgres + local Next dev server.
name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
  NEXT_PUBLIC_SUPABASE_URL: "https://ci.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
  OPENAI_API_KEY: "sk-ci"
  ANTHROPIC_API_KEY: "sk-ant-ci"
  GOOGLE_CIVIC_API_KEY: "ci"
  CONGRESS_DOT_GOV_API_KEY: "ci"
  ADMIN_API_KEY: "ci"
  CRON_SECRET: "ci"
  STRIPE_SECRET_KEY: "sk_test_ci"
  STRIPE_PUBLISHABLE_KEY: "pk_test_ci"
  STRIPE_WEBHOOK_SECRET: "whsec_ci"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        # pgvector image is Postgres 16 with the `vector` extension
        # preinstalled. Required by the bill-embedding migration —
        # vanilla postgres:16 fails `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npx prisma migrate deploy
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Run smoke tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
